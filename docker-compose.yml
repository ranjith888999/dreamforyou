version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: dreamfood-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-ranjith}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ranjith123}
      POSTGRES_DB: ${DB_NAME:-dreamfood}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ranjith}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dreamfood-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: dreamfood-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dreamfood-network

  # Backend API (FastAPI)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: dreamfood-backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-ranjith}:${DB_PASSWORD:-ranjith123}@postgres:5432/${DB_NAME:-dreamfood}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dreamfood-secret-key-change-in-production}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
      DEBUG: ${DEBUG:-False}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      APP_NAME: DreamFood
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - dreamfood-network
    restart: unless-stopped

  # Frontend (Next.js)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: dreamfood-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - dreamfood-network
    restart: unless-stopped

networks:
  dreamfood-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
